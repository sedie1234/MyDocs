<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>HW Profiling Timeline</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'D2Coding', monospace; background: #1e1e2e; color: #cdd6f4; }
.header { padding: 16px 24px; background: #181825; border-bottom: 1px solid #313244; }
.header h1 { font-size: 18px; color: #89b4fa; }
.header .stats { font-size: 13px; color: #a6adc8; margin-top: 6px; }
.controls { padding: 10px 24px; background: #181825; border-bottom: 1px solid #313244; display: flex; gap: 12px; align-items: center; }
.controls label { font-size: 12px; color: #a6adc8; }
.controls input[type=range] { width: 300px; }
.controls button { padding: 4px 12px; background: #313244; color: #cdd6f4; border: 1px solid #45475a; border-radius: 4px; cursor: pointer; font-size: 12px; }
.controls button:hover { background: #45475a; }
.legend { padding: 8px 24px; display: flex; gap: 16px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 4px; }
.legend-color { width: 14px; height: 14px; border-radius: 2px; }
.timeline-container { padding: 12px 24px; overflow-x: auto; }
.core-row { display: flex; align-items: center; margin-bottom: 2px; height: 28px; }
.core-label { width: 80px; font-size: 12px; color: #a6adc8; flex-shrink: 0; }
.core-track { position: relative; height: 24px; background: #11111b; border-radius: 3px; overflow: hidden; }
.span { position: absolute; height: 100%; border-radius: 2px; cursor: pointer; min-width: 3px; font-size: 9px; color: white; display: flex; align-items: center; padding: 0 2px; overflow: hidden; white-space: nowrap; }
.span:hover { opacity: 0.85; outline: 2px solid #f5c2e7; z-index: 10; }
.tooltip { display: none; position: fixed; background: #181825; border: 1px solid #45475a; padding: 8px 12px; border-radius: 6px; font-size: 12px; z-index: 100; max-width: 500px; pointer-events: none; }
.tooltip .tt-title { color: #89b4fa; font-weight: bold; margin-bottom: 4px; }
.tooltip .tt-detail { color: #a6adc8; }

/* HW State Panel */
#hw-state { padding: 16px 24px; background: #11111b; border-top: 2px solid #313244; }
.hw-cycle-display { font-size: 20px; color: #89b4fa; margin-bottom: 12px; font-family: 'Consolas', monospace; }
.hw-cycle-display .pin-indicator { font-size: 12px; color: #f38ba8; margin-left: 12px; }
.sm-bar-container { margin-bottom: 16px; }
.sm-bar-label { font-size: 11px; color: #a6adc8; margin-bottom: 4px; }
.sm-bar { height: 30px; background: #1e1e2e; border: 1px solid #45475a; border-radius: 4px; position: relative; overflow: hidden; }
.sm-region { position: absolute; height: 100%; border-radius: 2px; font-size: 9px; color: white; display: flex; align-items: center; justify-content: center; opacity: 0.8; transition: opacity 0.15s; }
.sm-region.active { opacity: 1.0; outline: 1px solid #f5c2e7; }
.core-cards { display: flex; flex-wrap: wrap; gap: 8px; }
.core-card { background: #181825; border: 1px solid #313244; border-radius: 6px; padding: 8px 12px; width: 210px; font-size: 11px; font-family: 'Consolas', monospace; }
.core-card.computing { border-color: #50c878; }
.core-card.dma { border-color: #4a90d9; }
.core-card.waiting { border-color: #e74c3c; }
.core-card.idle { border-color: #45475a; opacity: 0.5; }
.core-card .card-title { font-size: 12px; color: #89b4fa; margin-bottom: 4px; border-bottom: 1px solid #313244; padding-bottom: 3px; }
.core-card .state { font-weight: bold; font-size: 13px; margin-bottom: 2px; }
.core-card .state.computing { color: #50c878; }
.core-card .state.dma { color: #4a90d9; }
.core-card .state.waiting { color: #e74c3c; }
.core-card .state.idle { color: #6c7086; }
.core-card .info-row { display: flex; justify-content: space-between; margin-top: 2px; color: #a6adc8; }
.progress-bar { height: 6px; background: #313244; border-radius: 3px; margin-top: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.1s; }
.cursor-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #f5c2e7; pointer-events: none; z-index: 20; opacity: 0.7; }
</style>
</head>

<div class="legend">

</div>

<div class="timeline-container" id="timeline">
</div>

<div class="tooltip" id="tooltip">
  <div class="tt-title" id="tt-title"></div>
  <div class="tt-detail" id="tt-detail"></div>
</div>

<div id="hw-state">

function findSpanAtCycle(spans, cycle) {
    let lo = 0, hi = spans.length - 1;

        else return s;  // s.start <= cycle < s.end
    }
    return null;
}

// Count all events (=PC position) up to 'cycle'
function countEventsUpTo(spans, cycle) {
    let done = 0;
    const total = spans.length;
    for (const s of spans) {
        if (s.start <= cycle) done++;
        else break;
    }
    return { done: done, total: total };
}

// Find last DMA to UB before 'cycle' for this core
function findLastDMAtoUB(spans, cycle) {
    let lastDma = null;
    for (const s of spans) {
        if (s.start > cycle) break;
        if (s.type === 'DMA' && (s.dst_buf === 19 || s.dst_buf === 25)) {
            lastDma = s;
        }
    }
    return lastDma;
}

// Find all DMA spans active at 'cycle' across all cores (for SM map)
function findActiveDMAs(cycle) {
    const active = [];
    for (const core of ACTIVE_CORES) {
        const s = findSpanAtCycle(CORE_SPANS[core], cycle);
        if (s && s.type === 'DMA') {
            active.push({ core: core, span: s });
        }
    }
    return active;
}

// Extract opcode from label like "LAYER_RUN(Conv, 196968c)"
function extractOp(label) {
    const m = label.match(/\(([^,)]+)/);
    return m ? m[1] : '';
}

// Format bytes
function fmtBytes(b) {
    if (b >= 1024*1024) return (b/1024/1024).toFixed(1) + 'MB';
    if (b >= 1024) return (b/1024).toFixed(1) + 'KB';
    return b + 'B';
}

// State color class
function stateClass(type) {
    if (type === 'COMPUTE') return 'computing';
    if (type === 'DMA') return 'dma';
    if (type === 'WAIT') return 'waiting';
    return 'idle';
}

function updateHWState(cycle) {
    if (cycle == null || cycle < 0) return;
    cycle = Math.round(cycle);

    // 1. Cycle display
    const timeMs = (cycle * CLOCK_NS / 1e6).toFixed(2);
    const pinText = pinnedCycle !== null ? '<span class="pin-indicator">[PINNED - click to unpin]</span>' : '';
    document.getElementById('hw-cycle-display').innerHTML =
        `Cycle: ${cycle.toLocaleString()} (${timeMs} ms) ${pinText}`;

    // 2. SM Memory Map - show active DMAs
    const smBar = document.getElementById('sm-bar');
    smBar.innerHTML = '';
    const activeDMAs = findActiveDMAs(cycle);
    const smColors = { 19: '#6c757d', 25: '#50c878', 18: '#f39c12' };  // in:gray, out:green, out_sm:orange
    for (const d of activeDMAs) {
        const s = d.span;
        // Show SM side of the DMA
        let smAddr = 0, smSize = 0, color = '#4a90d9', lbl = '';
        if (s.src_buf === 24) {
            // SM → UB (input DMA)
            smAddr = s.src_addr;
            smSize = s.dma_size || 1;
            color = '#4a90d9';
            lbl = `C${d.core} read`;
        } else if (s.dst_buf === 18) {
            // UB → SM (output DMA)
            smAddr = s.dst_addr;
            smSize = s.dma_size || 1;
            color = '#50c878';
            lbl = `C${d.core} write`;
        } else {
            continue;
        }
        const leftPct = (smAddr / SM_BYTES) * 100;
        const widthPct = Math.max(0.3, (smSize / SM_BYTES) * 100);
        const region = document.createElement('div');
        region.className = 'sm-region active';
        region.style.left = leftPct + '%';
        region.style.width = widthPct + '%';
        region.style.background = color;
        region.textContent = lbl;
        region.title = `${lbl} @ 0x${smAddr.toString(16)} (${fmtBytes(smSize)})`;
        smBar.appendChild(region);
    }

    // 3. Core cards
    const cardsDiv = document.getElementById('core-cards');
    cardsDiv.innerHTML = '';
    for (const core of ACTIVE_CORES) {
        const spans = CORE_SPANS[core];
        const s = findSpanAtCycle(spans, cycle);
        const pc = countEventsUpTo(spans, cycle);
        const lastDma = findLastDMAtoUB(spans, cycle);

        const stType = s ? s.type : 'IDLE';
        const cls = stateClass(stType);

        const card = document.createElement('div');
        card.className = 'core-card ' + cls;

        // Progress
        const pct = pc.total > 0 ? Math.round(pc.done / pc.total * 100) : 0;
        const barFull = Math.round(pct / 10);
        const barEmpty = 10 - barFull;
        const barStr = '█'.repeat(barFull) + '░'.repeat(barEmpty);

        // UB info
        let ubInfo = '—';
        if (lastDma) {
            ubInfo = fmtBytes(lastDma.dma_size || 0);
        }

        // Current op
        let currentOp = '—';
        if (s) {
            currentOp = extractOp(s.label) || s.type;
        }

        // Span progress (within current span)
        let spanPct = 0;
        if (s && s.end > s.start) {
            spanPct = Math.round(((cycle - s.start) / (s.end - s.start)) * 100);
        }

        card.innerHTML = `
            <div class="card-title">Pcore ${core}</div>
            <div class="state ${cls}">${stType === 'COMPUTE' ? 'COMPUTING' : stType}</div>
            <div class="info-row"><span>PC:</span><span>${pc.done} / ${pc.total}</span></div>
            <div class="info-row"><span>Progress:</span><span>${barStr} ${pct}%</span></div>
            <div class="progress-bar"><div class="progress-fill" style="width:${spanPct}%; background:${COLORS[stType] || '#6c7086'}"></div></div>
            <div class="info-row"><span>UB last:</span><span>${ubInfo}</span></div>
            <div class="info-row"><span>Op:</span><span>${currentOp}</span></div>
        `;
        cardsDiv.appendChild(card);
    }
}

let pixelsPerCycle = 0.001;
let scrollOffset = 0;
const trackWidth = () => Math.max(window.innerWidth - 120, 800);

function render() {
    const container = document.getElementById('timeline');
    container.innerHTML = '';

    const viewWidth = trackWidth();
    const visibleCycles = viewWidth / pixelsPerCycle;
    const startCycle = scrollOffset;
    const endCycle = startCycle + visibleCycles;

    for (const core of ACTIVE_CORES) {
        const row = document.createElement('div');
        row.className = 'core-row';

        const label = document.createElement('div');
        label.className = 'core-label';
        label.textContent = 'Pcore ' + core;
        row.appendChild(label);

        const track = document.createElement('div');
        track.className = 'core-track';
        track.style.width = viewWidth + 'px';

        const spans = CORE_SPANS[core] || [];
        for (const s of spans) {
            if (s.end < startCycle || s.start > endCycle) continue;

            const left = Math.max(0, (s.start - startCycle) * pixelsPerCycle);
            const right = Math.min(viewWidth, (s.end - startCycle) * pixelsPerCycle);
            const width = Math.max(1, right - left);

            const span = document.createElement('div');
            span.className = 'span';
            span.style.left = left + 'px';
            span.style.width = width + 'px';
            span.style.background = COLORS[s.type] || COLORS['IDLE'];
            if (width > 40) span.textContent = s.label;

            span.addEventListener('mouseenter', (e) => {
                const tt = document.getElementById('tooltip');
                const dur = s.end - s.start;
                const timeUs = (dur * CLOCK_NS / 1000).toFixed(1);
                document.getElementById('tt-title').textContent =
                    `Core ${core} | ${s.type} | ${s.label}`;
                document.getElementById('tt-detail').innerHTML =
                    `Cycle: ${s.start.toLocaleString()} ~ ${s.end.toLocaleString()} (${dur.toLocaleString()} cycles = ${timeUs} μs)<br>${s.detail}`;
                tt.style.display = 'block';
                tt.style.left = (e.clientX + 12) + 'px';
                tt.style.top = (e.clientY + 12) + 'px';
            });
            span.addEventListener('mouseleave', () => {
                document.getElementById('tooltip').style.display = 'none';
            });
            span.addEventListener('mousemove', (e) => {
                const tt = document.getElementById('tooltip');
                tt.style.left = (e.clientX + 12) + 'px';
                tt.style.top = (e.clientY + 12) + 'px';
            });

            track.appendChild(span);
        }

        row.appendChild(track);
        container.appendChild(row);
    }

    // Draw cursor line if we have a cycle
    const displayCycle = pinnedCycle !== null ? pinnedCycle : lastHoverCycle;
    if (displayCycle !== null) {
        const tracks = container.querySelectorAll('.core-track');
        tracks.forEach(track => {
            const cursorX = (displayCycle - scrollOffset) * pixelsPerCycle;
            if (cursorX >= 0 && cursorX <= viewWidth) {
                const line = document.createElement('div');
                line.className = 'cursor-line';
                line.style.left = cursorX + 'px';
                track.appendChild(line);
            }
        });
    }
}

document.getElementById('zoom').addEventListener('input', (e) => {
    pixelsPerCycle = parseFloat(e.target.value) * 0.001;
    document.getElementById('zoom-val').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
    render();
});

document.getElementById('scroll').addEventListener('input', (e) => {
    scrollOffset = parseInt(e.target.value);
    document.getElementById('scroll-val').textContent = scrollOffset.toLocaleString();
    render();
});

function resetZoom() {
    document.getElementById('zoom').value = 1;
    pixelsPerCycle = 0.001;
    scrollOffset = 0;
    document.getElementById('scroll').value = 0;
    document.getElementById('zoom-val').textContent = '1.0x';
    document.getElementById('scroll-val').textContent = '0';
    render();
}

function getStep() {
    return parseInt(document.getElementById('step-size').value) || 1000;
}

function scrollLeft() {
    scrollOffset = Math.max(0, scrollOffset - getStep());
    document.getElementById('scroll').value = Math.min(scrollOffset, MAX_CYCLE);
    document.getElementById('scroll-val').textContent = Math.round(scrollOffset).toLocaleString();
    render();
}

function scrollRight() {
    scrollOffset = Math.min(MAX_CYCLE, scrollOffset + getStep());
    document.getElementById('scroll').value = Math.min(scrollOffset, MAX_CYCLE);
    document.getElementById('scroll-val').textContent = Math.round(scrollOffset).toLocaleString();
    render();
}

// 키보드: 좌우 화살표로 step 이동
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return; // input 필드에서는 무시
    if (e.key === 'ArrowLeft') { scrollLeft(); e.preventDefault(); }
    if (e.key === 'ArrowRight') { scrollRight(); e.preventDefault(); }
});

function zoomToFit() {
    const viewWidth = trackWidth();
    pixelsPerCycle = viewWidth / MAX_CYCLE;
    scrollOffset = 0;
    const zoomVal = pixelsPerCycle / 0.001;
    document.getElementById('zoom').value = Math.min(zoomVal, 100);
    document.getElementById('scroll').value = 0;
    document.getElementById('zoom-val').textContent = zoomVal.toFixed(1) + 'x';
    document.getElementById('scroll-val').textContent = '0';
    render();
}

// 마우스 휠 줌
document.getElementById('timeline').addEventListener('wheel', (e) => {
    e.preventDefault();
    const zoomStep = parseFloat(document.getElementById('zoom-step').value) || 1.25;
    const factor = e.deltaY > 0 ? (1.0 / zoomStep) : zoomStep;

    // 마우스 위치 기준 줌
    const rect = document.getElementById('timeline').getBoundingClientRect();
    const mouseX = e.clientX - rect.left - 80; // core label 너비 빼기
    const mouseCycle = scrollOffset + mouseX / pixelsPerCycle;

    pixelsPerCycle *= factor;
    pixelsPerCycle = Math.max(0.0000001, Math.min(10, pixelsPerCycle));

    // 마우스 위치를 중심으로 scroll 조정
    scrollOffset = mouseCycle - mouseX / pixelsPerCycle;
    scrollOffset = Math.max(0, scrollOffset);

    const zoomVal = pixelsPerCycle / 0.001;
    document.getElementById('zoom').value = Math.min(zoomVal, 100);
    document.getElementById('zoom-val').textContent = zoomVal.toFixed(1) + 'x';
    document.getElementById('scroll').value = Math.min(scrollOffset, MAX_CYCLE);
    document.getElementById('scroll-val').textContent = Math.round(scrollOffset).toLocaleString();
    render();
}, { passive: false });

// 마우스 드래그 스크롤
let isDragging = false;
let dragStartX = 0;
let dragStartScroll = 0;

document.getElementById('timeline').addEventListener('mousedown', (e) => {
    if (e.button === 0) { // 좌클릭만
        isDragging = true;
        dragStartX = e.clientX;
        dragStartScroll = scrollOffset;
        document.getElementById('timeline').style.cursor = 'grabbing';
    }
});

document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = e.clientX - dragStartX;
    scrollOffset = dragStartScroll - dx / pixelsPerCycle;
    scrollOffset = Math.max(0, Math.min(MAX_CYCLE, scrollOffset));
    document.getElementById('scroll').value = Math.min(scrollOffset, MAX_CYCLE);
    document.getElementById('scroll-val').textContent = Math.round(scrollOffset).toLocaleString();
    render();
});

document.addEventListener('mouseup', (e) => {
    if (isDragging) {
        const dx = Math.abs(e.clientX - dragStartX);
        isDragging = false;
        document.getElementById('timeline').style.cursor = 'default';
        // If it was a click (not a drag), toggle pin
        if (dx < 3) {
            const rect = document.getElementById('timeline').getBoundingClientRect();
            const mouseX = e.clientX - rect.left - 80;
            const cycle = scrollOffset + mouseX / pixelsPerCycle;
            if (pinnedCycle !== null) {
                pinnedCycle = null;  // unpin
            } else {
                pinnedCycle = Math.round(cycle);  // pin
            }
            updateHWState(pinnedCycle !== null ? pinnedCycle : lastHoverCycle);
            render();
        }
    }
});

// HW State: track mouse position over timeline (throttled)
let hwStateRafId = null;
document.getElementById('timeline').addEventListener('mousemove', (e) => {
    if (isDragging) return;
    const rect = document.getElementById('timeline').getBoundingClientRect();
    const mouseX = e.clientX - rect.left - 80;
    const cycle = scrollOffset + mouseX / pixelsPerCycle;
    lastHoverCycle = Math.round(Math.max(0, Math.min(MAX_CYCLE, cycle)));
    if (pinnedCycle === null) {
        if (hwStateRafId) cancelAnimationFrame(hwStateRafId);
        hwStateRafId = requestAnimationFrame(() => {
            updateHWState(lastHoverCycle);
            render();
            hwStateRafId = null;
        });
    }
});

document.getElementById('timeline').addEventListener('mouseleave', () => {
    if (pinnedCycle === null) {
        // Keep last state visible but don't clear
    }
});

// 초기 렌더링: fit to window
zoomToFit();
</script>

</body>
